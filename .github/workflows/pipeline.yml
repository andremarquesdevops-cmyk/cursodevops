name: CI Sistema Message Monitor - Build e Push to production

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    name: Build e Push PROD
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag and push image to Docker Hub
        env:
          DOCKERHUB_REPOSITORY: andremarquesdevops/cursodevops
        run: |
          VERSION_TAG=${{ github.run_number }}

          IMAGE_VERSION_TAG="$DOCKERHUB_REPOSITORY:${VERSION_TAG}"
          IMAGE_LATEST_TAG="$DOCKERHUB_REPOSITORY:latest"

          echo "Building image with tags: $IMAGE_VERSION_TAG and $IMAGE_LATEST_TAG"

          docker build \
            -t "$IMAGE_VERSION_TAG" \
            -t "$IMAGE_LATEST_TAG" \
            .

          docker push "$IMAGE_VERSION_TAG"
          docker push "$IMAGE_LATEST_TAG"


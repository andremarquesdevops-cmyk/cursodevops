name: CI Sistema Cotação - Build e Push to production
#
on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    name: Build e Push PROD
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag and push image to Docker Hub
        env:
          DOCKERHUB_REPOSITORY: andremarquesdevops/cursodevops
        run: |
          VERSION_TAG=${{ github.run_number }}

          IMAGE_VERSION_TAG="$DOCKERHUB_REPOSITORY:${VERSION_TAG}"
          IMAGE_LATEST_TAG="$DOCKERHUB_REPOSITORY:latest"

          echo "Building image with tags: $IMAGE_VERSION_TAG and $IMAGE_LATEST_TAG"

          docker build \
            -t "$IMAGE_VERSION_TAG" \
            -t "$IMAGE_LATEST_TAG" \
            .

          docker push "$IMAGE_VERSION_TAG"
          docker push "$IMAGE_LATEST_TAG"

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    environment: production
    name: Deploy para EC2

    steps:
      # NOVO STEP: Faz checkout do código do repositório para ter acesso aos arquivos atualizados
      - name: Checkout repository
        uses: actions/checkout@v4

      # NOVO STEP: Valida a sintaxe do docker-compose.yml ANTES de copiar (segurança)
      - name: Validate docker-compose.yml from repository
        run: |
          if [ !  -f "${{ github.workspace }}/docker-compose.yml" ]; then
            echo "❌ Arquivo docker-compose.yml não encontrado no repositório!"
            exit 1
          fi
          docker-compose -f ${{ github.workspace }}/docker-compose.yml config -q
          echo "✅ docker-compose.yml validado com sucesso"

      # NOVO STEP: Cria backup de segurança do docker-compose.yml atual antes de substituir
      - name: Backup current docker-compose.yml
        working-directory: /home/ubuntu/cursodevops
        run: |
          if [ -f docker-compose.yml ]; then
            cp docker-compose.yml docker-compose.yml.backup.$(date +%Y%m%d_%H%M%S)
            echo "✅ Backup criado com timestamp"
          else
            echo "⚠️ Nenhum docker-compose.yml encontrado para backup"
          fi

      # NOVO STEP: Substitui o docker-compose.yml do servidor com a versão do repositório
      - name: Update docker-compose.yml from repository
        run: |
          cp ${{ github.workspace }}/docker-compose.yml /home/ubuntu/cursodevops/docker-compose.yml
          echo "✅ docker-compose.yml atualizado do repositório"

      # NOVO STEP: Cria backup do .env atual antes de substituir
      - name: Backup current .env file
        working-directory: /home/ubuntu/cursodevops
        run: |
          if [ -f .env ]; then
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S)
            echo "✅ Backup do .env criado com timestamp"
          else
            echo "⚠️ Nenhum .env encontrado para backup"
          fi

      # NOVO STEP: Atualiza o arquivo .env com as variáveis SECRET do environment production.
      - name: Update .env file from GitHub environment secrets
        working-directory: /home/ubuntu/cursodevops
        env:
          ENV_CONTENT: ${{ secrets.APP_ENV_FILE }}
        run: |
          echo "$ENV_CONTENT" > .env
          chmod 600 .env
          echo "✅ .env atualizado com APP_ENV_FILE do environment PROD"
          echo "✅ Permissões ajustadas (600)"
          echo "✅ Total de linhas no .env: $(wc -l < .env)"

      - name: Pull latest image from Docker Hub
        run: |
          docker pull andremarquesdevops/cursodevops:${{ github.run_number }}

      - name: Stop and remove old container
        working-directory: /home/ubuntu/cursodevops
        run: |
          docker-compose down || true

      - name: Start new container
        working-directory: /home/ubuntu/cursodevops
        env:
          VERSION_TAG: ${{ github.run_number }}
        run: |
          docker-compose up -d

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to start..."
          sleep 20
        # verificacao do deploy
      - name: Verify deployment
        working-directory: /home/ubuntu/cursodevops
        run: |
          if docker ps | grep -q "cursodevops$"; then
            echo "✅ Container cursodevops is running"
          else
            echo "❌ Container cursodevops is not running"
            exit 1
          fi
          if docker ps | grep -q "cursodevops-celery-cadastro"; then
            echo "✅ Container cursodevops-celery-cadastro is running"
          else
            echo "❌ Container cursodevops-celery-cadastro is not running"
            exit 1
          fi
          docker ps | grep cursodevops

      - name: Clean up old Docker images
        run: |
          docker image prune -f
          echo "✅ Cleaned up unused Docker images"

      # NOVO STEP: Remove backups antigos mantendo apenas os 5 mais recentes
      - name: Clean up old backups
        working-directory: /home/ubuntu/cursodevops
        run: |
          ls -t docker-compose.yml.backup.* 2>/dev/null | tail -n +6 | xargs -r rm
          ls -t . env.backup.* 2>/dev/null | tail -n +6 | xargs -r rm
          echo "✅ Backups antigos removidos (mantidos últimos 5)"

      - name: Deployment summary
        if: success()
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "Image: andremarquesdevops/cursodevops:${{ github.run_number }}"
          echo "Container: cursodevops"
          echo "docker-compose.yml: ✅ Atualizado do repositório"
          echo ". env: ✅ Atualizado com APP_ENV_FILE do environment PROD"
          echo "Status: Running"  
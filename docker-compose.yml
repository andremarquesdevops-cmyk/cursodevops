services:
  web:
    image: andremarquesdevops/cursodevops:${VERSION_TAG}
    container_name: cursodevops-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - proxy
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn -c gunicorn.conf.py main.wsgi:application"
    restart: unless-stopped

networks:
 proxy:
  external: true